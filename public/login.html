<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Viscount's Rally Spamulator</title>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #141b2d;
            --border: #2a3a5c;
            --text: #e8eaf6;
            --text-muted: #7986cb;
            --accent: #64b5f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        .app-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .discord-btn:hover {
            background: #4752C4;
        }
        .discord-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .error-msg {
            color: #ff5252;
            font-size: 0.8rem;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="app-title">Viscount's Rally Spamulator</div>
        <div class="login-subtitle">Sign in to coordinate with your alliance</div>
        <a href="/auth/discord" class="discord-btn">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            Login with Discord
        </a>
        <div class="error-msg" id="error-msg"></div>
    </div>
    <script>
        // Check if already logged in
        fetch('/auth/status').then(r => {
            if (r.ok) window.location.href = '/';
        });
        // Show error if redirected with error param
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            const el = document.getElementById('error-msg');
            el.textContent = 'Authentication failed. Please try again.';
            el.style.display = 'block';
        }
    </script>
</body>
</html>
